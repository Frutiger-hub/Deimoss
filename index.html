<!DOCTYPE html>
<html lang="pt-PT" class="light" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoApp - Gestão de Jornada</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { transition: background-color 0.3s, color 0.3s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.2s ease-out; }

        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border-left-color: #ffffff;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200 min-h-screen font-sans pb-16">

    <!-- Modal de Alerta -->
    <div id="custom-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm hidden">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl max-w-sm w-full p-6 border border-slate-200 dark:border-slate-700 transform transition-all">
            <h3 id="modal-title" class="text-xl font-bold text-slate-900 dark:text-white mb-2">Aviso</h3>
            <p id="modal-message" class="text-slate-500 dark:text-slate-400 text-sm mb-6"></p>
            <div class="flex gap-3">
                <button id="modal-cancel-btn" onclick="closeModal()" class="flex-1 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 transition hidden">Cancelar</button>
                <button id="modal-confirm-btn" class="flex-1 py-2.5 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg transition">OK</button>
            </div>
        </div>
    </div>

    <!-- Cabeçalho -->
    <header class="max-w-6xl mx-auto px-4 pt-8 pb-10 flex flex-col md:flex-row justify-between items-center gap-6">
        <div class="flex items-center gap-4">
            <div class="bg-blue-600 p-3 rounded-2xl shadow-xl shadow-blue-500/30">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <div>
                <div class="flex items-center gap-2">
                    <h1 class="text-2xl md:text-3xl font-black text-slate-900 dark:text-white tracking-tight leading-none">PontoApp</h1>
                    <div id="status-cloud" class="p-1 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-400" title="Desconectado">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.5 19c-3.037 0-5.5-2.463-5.5-5.5 0-3.037 2.463-5.5 5.5-5.5s5.5 2.463 5.5 5.5c0 3.037-2.463 5.5-5.5 5.5zm-11.5-2c-2.485 0-4.5-2.015-4.5-4.5s2.015-4.5 4.5-4.5c.348 0 .684.04 1.008.115 1.066-2.474 3.518-4.115 6.492-4.115 3.197 0 5.86 1.905 6.848 4.625 1.631.644 2.801 2.215 2.801 4.07 0 2.411-1.959 4.364-4.375 4.364h-.275c-.244 3.08-2.836 5.441-5.991 5.441-3.155 0-5.747-2.361-5.991-5.441h-1.009z"/></svg>
                    </div>
                </div>
                <p class="text-[10px] font-bold text-blue-600 dark:text-blue-400 mt-1 uppercase tracking-[0.2em]">Sincronização em Tempo Real</p>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-800 px-10 py-4 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700 text-center min-w-[220px]">
            <div id="txt-hora" class="text-3xl font-black text-slate-800 dark:text-white tabular-nums tracking-tighter">00:00:00</div>
            <div id="txt-data" class="text-[10px] uppercase tracking-[0.15em] font-bold text-slate-400 dark:text-slate-500 mt-0.5">A carregar...</div>
        </div>

        <div class="flex items-center gap-3">
            <button onclick="toggleDarkMode()" class="p-3.5 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all active:scale-95 group">
                <svg class="w-6 h-6 text-slate-600 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <svg class="w-6 h-6 text-yellow-400 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Formulário -->
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
                <div id="form-header" class="bg-blue-600 p-6 text-white">
                    <h2 id="form-title" class="text-lg font-bold">Bater Ponto</h2>
                    <p class="text-xs opacity-80 font-medium">Persistência direta no Firestore</p>
                </div>
                
                <div class="p-6 space-y-5">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1">Funcionário</label>
                            <input type="text" id="in-nome" class="w-full p-3.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition font-semibold">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1">Data</label>
                            <input type="date" id="in-data" class="w-full p-3.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition font-semibold">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase block text-center mb-1">Entrada</label>
                                <input type="text" id="in-entrada" placeholder="08:00" maxlength="5" oninput="formatarInputHora(this)" class="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-center font-bold">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase block text-center mb-1">Almoço (S)</label>
                                <input type="text" id="in-ida-almoco" placeholder="12:00" maxlength="5" oninput="formatarInputHora(this)" class="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-center font-bold">
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase block text-center mb-1">Saída Final</label>
                                <input type="text" id="in-saida" placeholder="17:30" maxlength="5" oninput="formatarInputHora(this)" class="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-center font-bold">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase block text-center mb-1">Almoço (R)</label>
                                <input type="text" id="in-volta-almoco" placeholder="13:00" maxlength="5" oninput="formatarInputHora(this)" class="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-center font-bold">
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1">Observações</label>
                        <textarea id="in-obs" rows="2" class="w-full p-3.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition text-sm"></textarea>
                    </div>

                    <div class="space-y-3">
                        <button onclick="salvarRegistro()" id="btn-salvar" disabled class="w-full py-4 rounded-2xl font-black text-white bg-slate-400 flex justify-center items-center gap-2">
                            <span id="btn-text">CONECTANDO...</span>
                            <div id="btn-spinner" class="spinner hidden"></div>
                        </button>
                        <button id="btn-cancelar-edicao" onclick="cancelarEdicao()" class="w-full py-3 rounded-2xl font-bold text-slate-500 bg-slate-100 dark:bg-slate-700 hidden">CANCELAR</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard e Tabela -->
        <div class="lg:col-span-8 space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-200 dark:border-slate-700">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Registos Cloud</p>
                    <p id="dash-dias" class="text-4xl font-black">0</p>
                </div>
                <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-200 dark:border-slate-700">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Total Horas</p>
                    <p id="dash-trabalhado" class="text-4xl font-black text-blue-600">00:00h</p>
                </div>
                <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-200 dark:border-slate-700">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Saldo Geral</p>
                    <p id="dash-saldo" class="text-4xl font-black text-slate-300">00:00h</p>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 overflow-hidden">
                <div class="p-6 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                    <h3 class="font-black flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        Live Firestore Data
                    </h3>
                    <input type="text" id="in-filtro" oninput="filtrarBanco()" placeholder="Filtrar..." class="px-4 py-2 text-sm bg-slate-50 dark:bg-slate-900 border rounded-xl outline-none">
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 dark:bg-slate-900/50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            <tr>
                                <th class="px-6 py-4">Status / Utilizador</th>
                                <th class="px-6 py-4 text-center">Horários</th>
                                <th class="px-6 py-4 text-center">Trabalhado</th>
                                <th class="px-6 py-4 text-center">Saldo</th>
                                <th class="px-6 py-4"></th>
                            </tr>
                        </thead>
                        <tbody id="corpo-tabela" class="divide-y divide-slate-100 dark:divide-slate-700/50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const userFirebaseConfig = {
            apiKey: "AIzaSyACzHAv5xKUkNRSfcnAwSQxg1CTRnm8emU",
            authDomain: "deimos-1fdc4.firebaseapp.com",
            projectId: "deimos-1fdc4",
            storageBucket: "deimos-1fdc4.firebasestorage.app",
            messagingSenderId: "716958071081",
            appId: "1:716958071081:web:c6fb72e28f996f50c05f38"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userFirebaseConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ponto-app-v1';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let bancoDeDados = [];
        let userId = null;
        let registroEmEdicao = null;

        onAuthStateChanged(auth, (user) => {
            const btn = document.getElementById('btn-salvar');
            const cloudIcon = document.getElementById('status-cloud');
            if (user) {
                userId = user.uid;
                cloudIcon.classList.replace('text-slate-400', 'text-green-500');
                cloudIcon.title = "Sincronizado com Nuvem";
                ouvirBanco();
                btn.disabled = false;
                btn.className = "w-full py-4 rounded-2xl font-black text-white bg-blue-600 hover:bg-blue-700 transition shadow-lg flex justify-center items-center gap-2";
                document.getElementById('btn-text').textContent = "REGISTRAR PONTO";
            } else {
                autenticar();
            }
        });

        async function autenticar() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) { console.error("Erro Auth:", err); }
        }

        function ouvirBanco() {
            const coll = collection(db, 'artifacts', appId, 'users', userId, 'registros');
            // REGRA: onSnapshot garante tempo real e reflete mudanças no servidor
            onSnapshot(coll, (snap) => {
                bancoDeDados = snap.docs.map(d => ({ 
                    id: d.id, 
                    ...d.data(),
                    isLocal: d.metadata.hasPendingWrites // TRUE se ainda não chegou ao servidor
                }));
                bancoDeDados.sort((a, b) => new Date(b.data) - new Date(a.data));
                filtrarBanco();
            });
        }

        window.salvarRegistro = async () => {
            if (!userId) return;
            const btn = document.getElementById('btn-salvar');
            const btnSpinner = document.getElementById('btn-spinner');
            const btnText = document.getElementById('btn-text');
            
            const campos = {
                nome: document.getElementById('in-nome').value.trim(),
                data: document.getElementById('in-data').value,
                ent: document.getElementById('in-entrada').value,
                al1: document.getElementById('in-ida-almoco').value,
                al2: document.getElementById('in-volta-almoco').value,
                sai: document.getElementById('in-saida').value,
                obs: document.getElementById('in-obs').value.trim()
            };

            if (!campos.nome || !campos.data || !campos.ent || !campos.sai) return;

            btn.disabled = true;
            btnText.classList.add('hidden');
            btnSpinner.classList.remove('hidden');

            const mEnt = convMin(campos.ent);
            const mSai = convMin(campos.sai);
            let total = mSai >= mEnt ? (mSai - mEnt) : (1440 - mEnt + mSai);
            if (campos.al1 && campos.al2) total -= (convMin(campos.al2) - convMin(campos.al1));

            const payload = {
                ...campos, 
                totalTrabalhado: total, 
                saldo: total - 510, 
                ts: Date.now() 
            };

            try {
                const collPath = collection(db, 'artifacts', appId, 'users', userId, 'registros');
                if (registroEmEdicao) {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', userId, 'registros', registroEmEdicao), payload);
                    cancelarEdicao();
                } else {
                    await addDoc(collPath, payload);
                    limpar();
                }
            } catch (err) { console.error("Erro ao salvar:", err); }
            finally {
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
            }
        };

        window.editarRegistro = (id) => {
            const reg = bancoDeDados.find(r => r.id === id);
            registroEmEdicao = id;
            document.getElementById('in-nome').value = reg.nome;
            document.getElementById('in-data').value = reg.data;
            document.getElementById('in-entrada').value = reg.ent;
            document.getElementById('in-ida-almoco').value = reg.al1;
            document.getElementById('in-volta-almoco').value = reg.al2;
            document.getElementById('in-saida').value = reg.sai;
            document.getElementById('in-obs').value = reg.obs || "";
            document.getElementById('form-header').classList.replace('bg-blue-600', 'bg-amber-500');
            document.getElementById('btn-text').textContent = "ATUALIZAR";
            document.getElementById('btn-cancelar-edicao').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.excluirRegistro = async (id) => {
            if (confirm("Apagar registo na nuvem?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', userId, 'registros', id));
            }
        };

        window.cancelarEdicao = () => {
            registroEmEdicao = null;
            limpar();
            document.getElementById('form-header').classList.replace('bg-amber-500', 'bg-blue-600');
            document.getElementById('btn-text').textContent = "REGISTRAR PONTO";
            document.getElementById('btn-cancelar-edicao').classList.add('hidden');
        };

        const limpar = () => ['in-entrada','in-ida-almoco','in-volta-almoco','in-saida','in-obs'].forEach(id => document.getElementById(id).value = '');
        const convMin = (s) => s.split(':').reduce((h, m) => h * 60 + +m);
        const convHora = (min) => {
            const abs = Math.abs(min);
            return `${Math.floor(abs/60).toString().padStart(2,'0')}:${(abs%60).toString().padStart(2,'0')}`;
        };

        window.filtrarBanco = () => {
            const termo = document.getElementById('in-filtro').value.toLowerCase();
            const dados = bancoDeDados.filter(r => r.nome.toLowerCase().includes(termo) || r.data.includes(termo));
            render(dados);
        };

        const render = (dados) => {
            const corpo = document.getElementById('corpo-tabela');
            corpo.innerHTML = '';
            let tMin = 0, tSaldo = 0;

            dados.forEach(reg => {
                tMin += reg.totalTrabalhado; tSaldo += reg.saldo;
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 dark:hover:bg-slate-800/40 group transition";
                tr.innerHTML = `
                    <td class="px-6 py-5">
                        <div class="flex items-center gap-2">
                            <span class="px-1.5 py-0.5 rounded text-[8px] font-black uppercase ${reg.isLocal ? 'bg-amber-100 text-amber-600' : 'bg-green-100 text-green-600'}">
                                ${reg.isLocal ? 'Syncing' : 'Cloud'}
                            </span>
                            <div class="font-bold">${reg.nome}</div>
                        </div>
                        <div class="text-[10px] font-bold text-slate-400 mt-1">${reg.data.split('-').reverse().join('/')}</div>
                    </td>
                    <td class="px-6 py-5 text-center text-xs font-mono">${reg.ent} - ${reg.sai}</td>
                    <td class="px-6 py-5 text-center font-bold">${convHora(reg.totalTrabalhado)}h</td>
                    <td class="px-6 py-5 text-center font-black ${reg.saldo >= 0 ? 'text-green-500' : 'text-red-500'}">
                        ${reg.saldo >= 0 ? '+' : '-'}${convHora(reg.saldo)}h
                    </td>
                    <td class="px-6 py-5">
                        <div class="flex gap-2 opacity-0 group-hover:opacity-100">
                            <button onclick="editarRegistro('${reg.id}')" class="p-1 hover:text-blue-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button>
                            <button onclick="excluirRegistro('${reg.id}')" class="p-1 hover:text-red-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                        </div>
                    </td>
                `;
                corpo.appendChild(tr);
            });

            document.getElementById('dash-dias').textContent = dados.length;
            document.getElementById('dash-trabalhado').textContent = convHora(tMin) + 'h';
            const s = document.getElementById('dash-saldo');
            s.textContent = (tSaldo >= 0 ? '+' : '-') + convHora(tSaldo) + 'h';
            s.className = `text-4xl font-black ${tSaldo >= 0 ? 'text-green-500' : 'text-red-500'}`;
        };

        setInterval(() => {
            const n = new Date();
            document.getElementById('txt-hora').textContent = n.toLocaleTimeString('pt-PT');
            document.getElementById('txt-data').textContent = n.toLocaleDateString('pt-PT', { weekday: 'long', day: '2-digit', month: 'short' });
        }, 1000);

        window.formatarInputHora = (i) => {
            let v = i.value.replace(/\D/g, '');
            if (v.length > 2) v = v.substring(0, 2) + ':' + v.substring(2, 4);
            i.value = v;
        };
        window.toggleDarkMode = () => document.documentElement.classList.toggle('dark');
        window.closeModal = () => document.getElementById('custom-modal').classList.add('hidden');
        window.onload = () => document.getElementById('in-data').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
